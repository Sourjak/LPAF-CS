<script>
/* -------------------------
   SAFE DATA FROM FLASK
------------------------- */

const FLASK = {
  qr_image: "{{ qr_image | default('') }}",
  session_id: "{{ session_id | default('') }}",
  subject: "{{ subject | default('') }}",
  section: "{{ section | default('') }}",
  department: "{{ department | default('') }}",
  start_time: Number("{{ start_time | default(0) }}"),
  duration: Number("{{ duration | default(300) }}")
};


/* -------------------------
   FORM VALIDATION
------------------------- */

function validateAndSubmit() {

  const email = document.getElementById('in_email').value.trim();
  const subject = document.getElementById('in_subject').value.trim();
  const section = document.getElementById('in_section').value.trim();
  const dept = document.getElementById('in_dept').value.trim();

  const error = document.getElementById('errorBox');

  if(!email || !subject || !section || !dept) {

    error.classList.remove('hidden');

    if(typeof gsap !== "undefined"){
      gsap.fromTo("#errorBox",{x:-4},{x:4,duration:0.05,repeat:5,yoyo:true});
    }

    return;
  }

  error.classList.add('hidden');

  document.getElementById('sessionForm').submit();
}


/* -------------------------
   SESSION DETECTION
------------------------- */

const hasSession = FLASK.session_id && FLASK.session_id.length > 0;

if (hasSession) {

  document.getElementById('setupView').classList.add('hidden');
  document.getElementById('sessionView').classList.remove('hidden');

  document.getElementById('dispSubject').textContent =
      FLASK.subject + " - " + FLASK.section;

  document.getElementById('dispDept').textContent =
      FLASK.department;

  document.getElementById('qrImg').src =
      'data:image/png;base64,' + FLASK.qr_image;

  document.getElementById('downloadBtn').href =
      '/download_report/' + FLASK.session_id;

  startSessionLoops();
}


/* -------------------------
   SESSION LOOPS
------------------------- */

function startSessionLoops() {

  let uptime =
      FLASK.start_time
      ? Math.floor(Date.now()/1000) - FLASK.start_time
      : 0;

  setInterval(() => {

    uptime++;

    const el = document.getElementById('uptimeEl');

    if(el){
      el.textContent =
          String(Math.floor(uptime/60)).padStart(2,'0')
          + ':' +
          String(uptime%60).padStart(2,'0');
    }

  },1000);


  /* TIMER */

  function updateTimer(){

    const remaining =
      Math.max(0,
      FLASK.duration - (Date.now()/1000 - FLASK.start_time));

    const mins = document.getElementById('timerMins');
    const secs = document.getElementById('timerSecs');

    if(mins) mins.textContent =
        String(Math.floor(remaining/60)).padStart(2,'0');

    if(secs) secs.textContent =
        String(Math.floor(remaining%60)).padStart(2,'0');

    const bar = document.getElementById('timerBar');

    if(bar){
        bar.style.width =
        (remaining / FLASK.duration * 100) + '%';
    }

    if(remaining <= 0){
        location.reload();
    }

  }

  setInterval(updateTimer,1000);


  /* LIVE STATS */

  function getStats(){

    fetch('/session_stats/' + FLASK.session_id)

    .then(r => r.json())

    .then(data => {

      const count = data.count || 0;

      const counter =
          document.getElementById('subCount');

      if(counter) counter.textContent = count;

      const list =
          document.getElementById('recentList');

      if(list && data.recent){

        list.innerHTML = data.recent.map(i =>
          `<li class="act-item">
            <span>${i[0]}</span>
            <span>${i[1]}</span>
          </li>`
        ).join('');

      }

    })

    .catch(()=>{});

  }

  setInterval(getStats,3000);

}


/* -------------------------
   END SESSION
------------------------- */

function endSession(){

  if(!confirm("End session?")) return;

  fetch('/end_session/' + FLASK.session_id)

  .then(()=>location.reload())

  .catch(()=>location.reload());

}


/* -------------------------
   PARTICLES BACKGROUND
------------------------- */

const cvs=document.getElementById('pcvs');
const ctx=cvs.getContext('2d');

function resizeCanvas(){
  cvs.width=window.innerWidth;
  cvs.height=window.innerHeight;
}

resizeCanvas();
window.onresize=resizeCanvas;

const particles=Array.from({length:50},()=>({
  x:Math.random()*window.innerWidth,
  y:Math.random()*window.innerHeight,
  vx:(Math.random()-.5)*.3,
  vy:(Math.random()-.5)*.3
}));

(function animate(){

  ctx.clearRect(0,0,cvs.width,cvs.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>cvs.width) p.vx*=-1;
    if(p.y<0||p.y>cvs.height) p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,1,0,Math.PI*2);
    ctx.fillStyle="rgba(0,212,255,0.2)";
    ctx.fill();
  });

  requestAnimationFrame(animate);

})();


/* -------------------------
   CURSOR EFFECT
------------------------- */

const curDot=document.getElementById('curDot');
const curRing=document.getElementById('curRing');

let mx=0,my=0;

window.onmousemove=e=>{
  mx=e.clientX;
  my=e.clientY;

  curDot.style.left=mx+'px';
  curDot.style.top=my+'px';

  curDot.style.opacity=1;
  curRing.style.opacity=1;
};

(function cursorLoop(){

  const rx=parseFloat(curRing.style.left||0);
  const ry=parseFloat(curRing.style.top||0);

  curRing.style.left=rx+(mx-rx)*0.1+'px';
  curRing.style.top=ry+(my-ry)*0.1+'px';

  requestAnimationFrame(cursorLoop);

})();
</script>

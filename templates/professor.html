<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LPAF | Professor Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- (ALL YOUR ORIGINAL CSS REMAINS UNCHANGED) -->

<style>
/* keeping your entire CSS exactly as you wrote it */
</style>

</head>

<body>

<!-- ORBS -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<canvas id="pcvs"></canvas>

<div id="curDot"></div>
<div id="curRing"></div>

<div id="sp"></div>


<!-- NAVBAR (UNCHANGED) -->
<nav class="px-8 py-4">
<div class="max-w-6xl mx-auto flex items-center justify-between">

<div class="flex items-center gap-3">
<div class="logo-icon">LPAF</div>

<div>
<div style="font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700;">LPAF Control</div>
<div style="font-family:'Share Tech Mono',monospace;font-size:0.48rem;color:rgba(0,212,255,0.4);">SECURE ATTENDANCE SYSTEM</div>
</div>
</div>

<div class="hidden md:flex items-center gap-8">
<a href="#" class="nav-a on">Dashboard</a>
<a href="#" class="nav-a">Session History</a>
<a href="#" class="nav-a">System Logs</a>
</div>

<div class="flex items-center gap-3">
<div class="badge"><span class="bdot"></span>SYSTEM ONLINE</div>
<a href="/" class="back-btn">← Landing</a>
</div>

</div>
</nav>



<main style="padding-top:6rem;padding-bottom:5rem;">

<div class="max-w-6xl mx-auto px-8">


<!-- SESSION SETUP VIEW -->

<div id="setupView">

<div style="text-align:center;margin-bottom:2.5rem;">

<span class="slabel">// PROFESSOR DASHBOARD</span>

<h1 style="font-family:'Orbitron';font-size:1.6rem;font-weight:700;">
New Attendance <span style="color:var(--cyan);">Session</span>
</h1>

<p style="font-family:'Share Tech Mono';font-size:0.62rem;color:rgba(255,255,255,0.28);">
Configure and launch a secure QR attendance session
</p>

</div>


<div style="max-width:26rem;margin:0 auto;">

<form method="POST" class="card" style="padding:2rem;">

<span class="slabel">// Start New Session</span>

<div style="display:flex;flex-direction:column;gap:0.9rem;margin-top:1rem;">

<input name="email" type="email" placeholder="Professor Email" class="inp" required>

<input name="subject" placeholder="Subject Code" class="inp" required>

<input name="section" placeholder="Section" class="inp" required>

<input name="department" placeholder="Department" class="inp" required>

<select name="duration" class="inp">

<option value="300">5 Minutes</option>
<option value="120">2 Minutes</option>
<option value="60">1 Minute</option>

</select>

<button class="btn-p">Generate Secure QR</button>

</div>

</form>

</div>

</div>



<!-- SESSION ACTIVE VIEW -->

<div id="sessionView" class="hidden">

<h1 style="font-family:'Orbitron';font-size:1.6rem;">Session Active</h1>

<div class="card p-6 mt-6 text-center">

<img id="qrImg" src="" style="width:180px;height:180px;margin:auto;background:white;padding:6px;border-radius:6px;">

<div class="mt-6">

<span id="timerMins" class="timer-num">00</span>
<span class="timer-sep">:</span>
<span id="timerSecs" class="timer-num">00</span>

</div>

<div class="mt-6">

<button onclick="endSession()" class="btn-red">End Session</button>

</div>

</div>

</div>

</div>

</main>



<script>

/* =============================
   SAFE FLASK VARIABLES
============================= */

const FLASK = {

qr_image: "{{ qr_image | default('') }}",

session_id: "{{ session_id | default('') }}",

subject: "{{ subject | default('') }}",

section: "{{ section | default('') }}",

department: "{{ department | default('') }}",

start_time: Number("{{ start_time | default(0) }}"),

duration: Number("{{ duration | default(300) }}")

};


let sessionClosed = false;


/* =============================
   SESSION DETECTION
============================= */

const hasSession = FLASK.session_id && FLASK.session_id.length > 0;

if(hasSession){

document.getElementById("setupView").classList.add("hidden");

document.getElementById("sessionView").classList.remove("hidden");

document.getElementById("qrImg").src = "data:image/png;base64," + FLASK.qr_image;

startSession();

}


/* =============================
   SESSION LOGIC
============================= */

function startSession(){

updateTimer();

setInterval(updateTimer,1000);

setInterval(refreshQR,90000);

}


/* =============================
   TIMER
============================= */

function updateTimer(){

if(sessionClosed) return;

const remaining = Math.max(
0,
FLASK.duration - (Date.now()/1000 - FLASK.start_time)
);

const mins = Math.floor(remaining/60);
const secs = Math.floor(remaining%60);

document.getElementById("timerMins").innerText =
String(mins).padStart(2,"0");

document.getElementById("timerSecs").innerText =
String(secs).padStart(2,"0");

if(remaining<=0 && !sessionClosed){

sessionClosed = true;

fetch("/end_session/"+FLASK.session_id)
.then(r=>r.json())
.then(()=>{
alert("Session ended. Report emailed.");
location.reload();
})
.catch(()=>location.reload());

}

}


/* =============================
   QR REFRESH
============================= */

function refreshQR(){

if(sessionClosed) return;

fetch("/refresh_qr/"+FLASK.session_id)

.then(r=>r.json())

.then(data=>{

if(data.expired){

sessionClosed = true;

alert("Session expired. Report sent.");

location.reload();

return;

}

if(data.qr){

document.getElementById("qrImg").src =
"data:image/png;base64,"+data.qr;

}

});

}


/* =============================
   MANUAL SESSION END
============================= */

function endSession(){

if(!confirm("End session and generate report?")) return;

sessionClosed = true;

fetch("/end_session/"+FLASK.session_id)

.then(r=>r.json())

.then(()=>{

alert("Session ended. Report emailed.");

location.reload();

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPAF | Professor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root { --cyan: #00D4FF; --blue: #1A6BFF; --dark: #060A14; --green: #00FF88; --red: #FF3B3B; }
        body { font-family: 'Exo 2', sans-serif; background: #060A14; color: white; min-height: 100vh; overflow-x: hidden;
            background-image: linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px);
            background-size: 48px 48px; }
        
        /* Cyber-Dashboard Elements */
        .orb { position: fixed; border-radius: 50%; filter: blur(110px); pointer-events: none; z-index: 0; opacity: 0.5; }
        .card { background: rgba(0,212,255,0.03); border: 1px solid rgba(0,212,255,0.11); border-radius: 12px; backdrop-filter: blur(10px); position: relative; }
        .slabel { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--cyan); letter-spacing: 0.2em; text-transform: uppercase; }
        .inp { background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.15); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .btn-p { background: var(--cyan); color: var(--dark); font-family: 'Orbitron', sans-serif; font-weight: 700; transition: 0.3s; }
        .btn-p:hover { box-shadow: 0 0 20px var(--cyan); transform: translateY(-2px); }
        .timer-num { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--red); text-shadow: 0 0 15px rgba(255,59,59,0.4); }
        .scan-line { position: absolute; left: 10px; right: 10px; height: 2px; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); animation: scan 3s ease-in-out infinite; }
        @keyframes scan { 0%, 100% { top: 10%; opacity: 0; } 50% { top: 90%; opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="orb w-[500px] h-[500px] bg-blue-900/20 -top-20 -right-20"></div>
<div class="orb w-[400px] h-[400px] bg-cyan-900/10 top-1/2 -left-20"></div>

<nav class="relative z-10 px-8 py-4 border-b border-white/5 bg-black/40 backdrop-blur-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500/10 border border-cyan-500/30 rounded flex items-center justify-center font-bold text-cyan-400">LPAF</div>
            <div>
                <h2 class="text-sm font-bold tracking-widest font-['Orbitron']">PROFESSOR CONSOLE</h2>
                <p class="text-[10px] text-cyan-500/50 font-['Share_Tech_Mono']">SECURE AUTHENTICATION</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-['Share_Tech_Mono'] text-green-400 border border-green-400/20 px-2 py-1 rounded bg-green-400/5">● SYSTEM ONLINE</span>
        </div>
    </div>
</nav>

<main class="relative z-10 max-w-6xl mx-auto px-8 py-12">

    {% if not qr_image %}
    <div id="setupView" class="max-w-md mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold font-['Orbitron'] mb-2">New <span class="text-cyan-400">Session</span></h1>
            <p class="text-sm text-gray-500 font-['Share_Tech_Mono']">CONFIGURE ATTENDANCE PARAMETERS</p>
        </div>

        <form method="POST" class="card p-8 flex flex-col gap-5">
            <div class="flex flex-col gap-1">
                <label class="slabel">Professor Email</label>
                <input name="email" type="email" class="inp" placeholder="email@institution.edu" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="slabel">Subject Code</label>
                    <input name="subject" class="inp" placeholder="e.g. CS401" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="slabel">Section</label>
                    <input name="section" class="inp" placeholder="e.g. A" required>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="slabel">Session Duration</label>
                <select name="duration" class="inp cursor-pointer">
                    <option value="60">1 Minute (Quick Test)</option>
                    <option value="300" selected>5 Minutes (Standard)</option>
                    <option value="600">10 Minutes</option>
                </select>
            </div>
            <button type="submit" class="btn-p py-4 rounded-lg mt-4 text-sm tracking-widest uppercase">Launch Secure Session</button>
        </form>
    </div>
    {% endif %}

    {% if qr_image %}
    <div id="sessionView" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="card p-8 text-center flex flex-col items-center">
                <label class="slabel mb-4">// DYNAMIC SECURE QR</label>
                <div class="relative bg-white p-4 rounded-xl mb-6">
                    <div class="scan-line"></div>
                    <img id="qrImage" src="data:image/png;base64,{{qr_image}}" class="w-64 h-64">
                </div>
                <div class="w-full text-center">
                    <p class="slabel text-[0.5rem] opacity-50 mb-2">Time Remaining</p>
                    <div id="timer" class="timer-num">--:--</div>
                    <div class="w-full bg-white/5 h-1 mt-4 rounded-full overflow-hidden">
                        <div id="timerBar" class="h-full bg-red-500 transition-all duration-1000" style="width: 100%"></div>
                    </div>
                </div>
            </div>

            <button onclick="endSession(event)" class="w-full bg-red-500/10 border border-red-500/30 text-red-500 py-3 rounded-lg font-bold font-['Orbitron'] text-xs hover:bg-red-500 hover:text-white transition-all uppercase tracking-widest">
                Terminate Session
            </button>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="card p-6">
                    <label class="slabel">Students Present</label>
                    <div id="submissionCount" class="text-4xl font-bold text-cyan-400 mt-2">0</div>
                </div>
                <div class="card p-6">
                    <label class="slabel">Session Status</label>
                    <div class="text-sm font-bold text-green-400 mt-3 flex items-center gap-2">
                        <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                        ACTIVE
                    </div>
                </div>
            </div>

            <div class="card p-6 flex-1 h-[300px] flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <label class="slabel">// LIVE ACTIVITY LOG</label>
                    <a href="/download_report/{{session_id}}" class="text-[10px] text-cyan-400 underline uppercase">Export CSV</a>
                </div>
                <ul id="recentList" class="space-y-2 overflow-y-auto pr-2 font-['Share_Tech_Mono'] text-sm">
                    <li class="text-white/20 text-center py-10">Waiting for connections...</li>
                </ul>
            </div>
        </div>
    </div>
    {% endif %}

</main>

<script>
    // Flask Data Bridge
    const sessionId = "{{session_id}}";
    const sessionStart = {{start_time or 0}};
    const duration = {{duration or 300}};

    if (sessionId) {
        // 1. Timer Logic
        function updateTimer() {
            const remaining = Math.max(0, duration - (Date.now() / 1000 - sessionStart));
            const m = Math.floor(remaining / 60);
            const s = Math.floor(remaining % 60);
            const timerEl = document.getElementById("timer");
            const bar = document.getElementById("timerBar");

            if (timerEl) {
                timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                bar.style.width = (remaining / duration * 100) + "%";
                if (remaining < 30) timerEl.classList.add("animate-pulse");
            }

            if (remaining <= 0) {
                fetch(`/end_session/${sessionId}`).then(() => location.reload());
            }
        }

        // 2. Stats & Logs Logic
        function updateStats() {
            fetch(`/session_stats/${sessionId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("submissionCount").innerText = data.count;
                    const list = document.getElementById("recentList");
                    if (data.recent.length > 0) {
                        list.innerHTML = data.recent.map(item => `
                            <li class="bg-white/5 p-2 rounded border-l-2 border-cyan-500 flex justify-between">
                                <span>${item[0]}</span>
                                <span class="text-white/30 text-[10px]">${item[1]}</span>
                            </li>
                        `).join('');
                    }
                });
        }

        // 3. QR Rotation
        function refreshQR() {
            fetch(`/refresh_qr/${sessionId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.qr) document.getElementById("qrImage").src = "data:image/png;base64," + data.qr;
                });
        }

        // Intervals
        setInterval(updateTimer, 1000);
        setInterval(updateStats, 3000);
        setInterval(refreshQR, 90000);
        updateTimer();
        updateStats();
    }

    function endSession(event) {
        if(confirm("Generate final report and close session?")) {
            event.target.innerText = "Closing...";
            fetch(`/end_session/${sessionId}`).then(() => location.reload());
        }
    }

    // GSAP Entrances
    window.onload = () => {
        gsap.from(".card", { opacity: 0, y: 30, duration: 0.8, stagger: 0.2, ease: "power4.out" });
    };
</script>

</body>
</html>
